<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login | InsightDataMiner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        body::before { content: ""; position: absolute; width: 200%; height: 200%; background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 40%); animation: rotateAurora 20s linear infinite; z-index: -1; }
        @keyframes rotateAurora { 100% { transform: rotate(360deg); } }
        .glass-box { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .form-control { background: rgba(2, 6, 23, 0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 10px; padding: 12px; margin-bottom: 15px;}
        .form-control:focus { border-color: #38bdf8 !important; box-shadow: 0 0 15px rgba(56,189,248,0.2) !important; }
        .btn-glow { background: linear-gradient(135deg, #38bdf8, #8b5cf6); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-glow:hover { box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="glass-box text-center">
        <h3 class="fw-bold mb-1">Welcome Back</h3>
        <p class="text-muted small mb-4">Login to download your insights</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-glow mt-2">Log In <i class="fa-solid fa-right-to-bracket ms-2"></i></button>
        </form>
        
        <p class="mt-4 small text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-info text-decoration-none fw-bold">Sign Up</a></p>
        <a href="{% url 'home' %}" class="text-muted small text-decoration-none mt-2 d-block"><i class="fa-solid fa-arrow-left me-1"></i> Cancel</a>
    </div>
</body>
</html>
