<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <script>
        let match = document.cookie.match(new RegExp('(^| )idm_theme=([^;]+)'));
        let theme = match ? match[2] : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
    <meta charset="UTF-8">
    <title>Sign Up | InsightDataMiner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; transition: 0.3s; }
        body::before { content: ""; position: fixed; width: 200%; height: 200%; background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 40%); animation: rotateAurora 20s linear infinite; z-index: -1; }
        @keyframes rotateAurora { 100% { transform: rotate(-360deg); } }
        .glass-box { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.3s;}
        .form-control { background: rgba(2, 6, 23, 0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; border-radius: 10px; padding: 12px; margin-bottom: 15px;}
        .form-control:focus { border-color: #8b5cf6 !important; box-shadow: 0 0 15px rgba(139,92,246,0.2) !important; }
        .btn-glow { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-glow:hover { box-shadow: 0 10px 20px rgba(236, 72, 153, 0.4); transform: translateY(-2px); }
        ul.errorlist { color: #ef4444; font-size: 0.8rem; list-style: none; padding: 0; margin-top: -10px; margin-bottom: 10px;}

        /* ========================================================
           🌟 THEME OVERRIDES (ONLY CHANGES COLORS) 🌟
           ======================================================== */
        [data-theme="light"] body { background-color: #ffffff; color: #0f172a; }
        [data-theme="light"] body::before { opacity: 0; }
        [data-theme="light"] .glass-box { background: #ffffff; border-color: #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        [data-theme="light"] .text-muted { color: #64748b !important; }
        [data-theme="hybrid"] body { background-color: #f1f5f9; color: #0f172a; }
        [data-theme="hybrid"] .glass-box { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); border-color: rgba(56, 189, 248, 0.3); }
        [data-theme="hybrid"] .text-muted { color: #475569 !important; }
    </style>
</head>
<body>
    <div class="dropdown position-absolute top-0 end-0 m-4">
        <button class="btn btn-sm btn-outline-info rounded-pill px-3 dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="fa-solid fa-palette me-1"></i> Theme
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-lg" style="background: rgba(15,23,42,0.95); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            <li><a class="dropdown-item text-light" href="#" onclick="setTheme('dark')"><i class="fa-solid fa-moon me-2 text-primary"></i> Dark</a></li>
            <li><a class="dropdown-item text-light" href="#" onclick="setTheme('light')"><i class="fa-solid fa-sun me-2 text-warning"></i> Light</a></li>
            <li><a class="dropdown-item text-light" href="#" onclick="setTheme('hybrid')"><i class="fa-solid fa-layer-group me-2 text-success"></i> Hybrid</a></li>
        </ul>
    </div>

    <div class="glass-box">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">Create Account</h3>
            <p class="text-muted small">Join InsightDataMiner to download insights.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-glow mt-2">Sign Up Securely <i class="fa-solid fa-bolt ms-2"></i></button>
        </form>
        
        <div class="text-center mt-4">
            <p class="small text-muted">Already have an account? <a href="{% url 'login' %}" class="text-purple text-decoration-none fw-bold" style="color:#8b5cf6;">Log In</a></p>
            <a href="{% url 'home' %}" class="text-muted small text-decoration-none mt-2 d-inline-block"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 🌟 THEME SETTER FUNCTION 🌟
        function setTheme(themeName) {
            document.cookie = "idm_theme=" + themeName + "; path=/; max-age=31536000";
            window.location.reload(); 
        }
    </script>
</body>
</html>
